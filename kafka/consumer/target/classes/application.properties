# ==============================================================
# ALTERE APENAS ESTA SEÇÃO — configurações específicas do projeto
# ==============================================================

# Endereço do broker Kafka (host:porta)
kafka.broker=localhost:9092

# Nome do tópico que este serviço vai consumir
kafka.topico=meu-topico

# ID do grupo de consumidores (único por serviço)
kafka.grupo=meu-grupo-consumidor

# URL do próximo serviço para encaminhamento do resultado via HTTP POST
# Deixe vazio para desativar o encaminhamento (kafka.destino.url=)
kafka.destino.url=

# Número de tentativas antes de enviar a mensagem para a Dead Letter Topic (DLT)
# Mínimo recomendado: 3  |  Produção: 5
kafka.dlq.tentativas=3

# Porta HTTP deste serviço (para o endpoint de polling do frontend)
server.port=8081

# ==============================================================
# FIM DA SEÇÃO DE CONFIGURAÇÃO — não altere abaixo desta linha
# ==============================================================

# Número de threads consumidoras em paralelo
# Deve ser <= número de partições do tópico para ser efetivo
kafka.consumer.concurrency=3

# Logging — ajuste o nível conforme o ambiente (DEBUG em dev, INFO/WARN em prod)
logging.level.com.example.consumer=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
