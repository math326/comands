# =============================================================
# ALTERE APENAS ESTA SEÇÃO — configurações específicas do projeto
# =============================================================

# Endereço do broker Kafka (host:porta). Para múltiplos brokers,
# separe por vírgula: broker1:9092,broker2:9092
kafka.broker=localhost:9092

# Nome do tópico Kafka onde os eventos serão publicados
kafka.topico=eventos

# Nome do campo do JSON que será usado como chave de particionamento.
# Exemplo: "conta_origem" garante que todos os eventos de uma mesma
# conta caiam sempre na mesma partição (ordem garantida por conta).
kafka.chave-campo=conta_origem

# Porta em que a aplicação Spring Boot irá subir
server.port=8080

# =============================================================
# NÃO ALTERE ABAIXO — configurações internas gerenciadas pelo código
# =============================================================

# Identificador do grupo de consumidores (não usado pelo producer,
# mas necessário para o Spring Kafka não reclamar em auto-config)
spring.kafka.consumer.group-id=evento-producer-group

# Desativa a criação automática de beans de consumer — este serviço
# é exclusivamente producer
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Formato de log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.com.producer=INFO
logging.level.org.apache.kafka=WARN
